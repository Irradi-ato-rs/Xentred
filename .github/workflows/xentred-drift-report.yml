name: Xentred Drift Report

on:
  pull_request_target:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  drift:
    name: Drift report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run drift report
        run: bash .github/scripts/xentred-drift-report.sh

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: drift/
