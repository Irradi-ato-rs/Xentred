name: Xentred Drift Report

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run drift report
        run: bash .github/scripts/xentred-drift-report.sh

      - uses: actions/upload-artifact@v4
        with:
          name: xentred-drift-report-${{ github.run_id }}
          path: drift/
