name: RER Free Fallback Rollout (v0.9)

on:
  workflow_dispatch:
    inputs:
      org: Irradi-ato-rs
        description: "Organization login"
        required: true
        type: string
      default_branch:
        description: "Default branch"
        required: false
        default: main
        type: string
      repos_allowlist:
        description: "Optional repo allowlist"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      export_evidence:
        description: "Export evidence bundle"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      strict:
        description: "STRICT / DCVX mode"
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]

jobs:
  rollout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ORG: ${{ inputs.org }}
      DEFAULT_BRANCH: ${{ inputs.default_branch }}
      REPOS_ALLOWLIST: ${{ inputs.repos_allowlist }}
      DRY_RUN: ${{ inputs.dry_run }}
      EXPORT_EVIDENCE: ${{ inputs.export_evidence }}
      STRICT: ${{ inputs.strict }}
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}

    steps:
      - name: Checkout (pinned)
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Run RER Free Fallback Rollout
        shell: bash
        run: |
          bash .github/scripts/rer-free-fallback-rollout.sh