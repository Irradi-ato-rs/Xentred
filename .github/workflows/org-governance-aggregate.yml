name: Org Governance Aggregation (read-only)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # daily UTC, after Doctor

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ORG: Irradi-ato-rs
      GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Aggregate governance health
        shell: bash
        run: |
          bash .github/scripts/org-governance-aggregate.sh