name: Org Governance Aggregation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run org governance aggregator
        env:
          ORG: "Irradi-ato-rs"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/org-governance-aggregate.sh

      - uses: actions/upload-artifact@v4
        with:
          name: org-governance-aggregate-${{ github.run_id }}
          path: summary.json
          if-no-files-found: ignore