name: Xentred RER Doctor

on:
  pull_request_target:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  doctor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run RER Doctor
        run: bash .github/scripts/rer-doctor.sh
