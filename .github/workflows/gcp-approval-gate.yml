name: GovOps Advisory Approval Gate

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  advisory-gate:
    name: GovOps Advisory Approval Classification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout govops
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # ✅ Read severity classification input file if present
      # ---------------------------------------------------------------
      - name: Load severity (best effort)
        id: severity
        run: |
          if [[ -f SEVERITY.txt ]]; then
            echo "severity=$(cat SEVERITY.txt)" >> $GITHUB_OUTPUT
          else
            echo "severity=Unknown" >> $GITHUB_OUTPUT
          fi

      # ---------------------------------------------------------------
      # ✅ Apply advisory labels
      # ---------------------------------------------------------------
      - name: Apply advisory label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            ${{ steps.severity.outputs.severity == 'P0 (Critical — Requires GCP and rexce contract update)' && 'gcp/p0-critical' || '' }}
            ${{ steps.severity.outputs.severity == 'P1 (High — Governance-circuit change)' && 'gcp/p1-high' || '' }}
            ${{ steps.severity.outputs.severity == 'P2 (Medium — Governance documentation)' && 'gcp/p2-medium' || '' }}
            ${{ steps.severity.outputs.severity == 'P3 (Low)' && 'gcp/p3-low' || '' }}

      # ---------------------------------------------------------------
      # ✅ Post advisory‑only comment
      # ---------------------------------------------------------------
      - name: Post advisory gate summary
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🛂 GovOps Advisory Approval Gate

            Severity classification: **${{ steps.severity.outputs.severity }}**

            GovOps approval is **advisory only** and **does not block merging**.
            Final enforcement is performed exclusively by:

            ✅ rexce (Phase‑2 validator)  
            ✅ Xcectua (Phase‑4 automation plane)

            Labels have been applied accordingly.