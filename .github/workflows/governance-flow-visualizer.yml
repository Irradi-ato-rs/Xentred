name: Governance Flow Visualizer

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  visualize:
    name: Generate Governance Flow Diagram
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Generate ASCII diagram
        run: |
          cat > GOVERNANCE_FLOW.txt <<'EOF'
┌──────────────────────────┐
│        rexce (P2)         │
│ Canonical Validator       │
│ - contract                │
│ - policies (OPA)          │
│ - invariants              │
└─────────────┬────────────┘
              │
              ▼
┌──────────────────────────┐
│       Xentred (P3/P4)     │
│ Reference Circuit Source  │
│ GCP Evolution Ground      │
└─────────────┬────────────┘
              │
              ▼
┌──────────────────────────┐
│     re-starter (Local)    │
│ Deterministic Bootstrap   │
│ installs RER circuit      │
└─────────────┬────────────┘
              │
              ▼
┌──────────────────────────┐
│   Adopter Repositories    │
│ RER Circuit installed     │
│ Evidence + PDR + Gate     │
└─────────────┬────────────┘
              │
              ▼
┌──────────────────────────┐
│    Xcectua (Phase-4)      │
│ Org-wide Automation Plane │
│ - wave planning           │
│ - mapping & scanning      │
│ - propagation             │
└─────────────┬────────────┘
              │
              ▼
┌──────────────────────────┐
│        GovOps (Advisory)  │
│ - GCP review              │
│ - dashboards              │
│ - diff packets            │
└──────────────────────────┘
EOF

      - name: Generate Graphviz diagram
        run: |
          cat > flow.dot <<'EOF'
digraph governance {
  rankdir=TB;
  node [shape=box, style=filled, color=lightgray];

  rexce     [label="rexce\n(P2 Canonical Validator)"];
  xentred   [label="Xentred\n(P3/P4 Reference Governance)"];
  restarter [label="re-starter\n(Local Bootstrap)"];
  adopter   [label="Adopter Repos\n(RER Circuit)"];
  xcectua   [label="Xcectua\n(P4 Automation)"];
  govops    [label="GovOps\n(Advisory Authority)"];

  rexce -> xentred;
  xentred -> restarter;
  restarter -> adopter;
  adopter -> xcectua;
  xcectua -> govops;
}
EOF
          dot -Tsvg flow.dot > GOVERNANCE_FLOW.svg

      - name: Commit flow diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GOVERNANCE_FLOW.txt GOVERNANCE_FLOW.svg || true
          git commit -m "Update governance flow diagrams" || echo "No changes"
          git push || echo "No changes"
``