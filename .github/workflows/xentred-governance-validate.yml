name: Xentred Governance Validation

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-governance:
    name: Validate Xentred Against Canonical Governance Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Xentred
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # ✅ Install rexce (canonical validator only — no copies)
      # ---------------------------------------------------------------
      - name: Install rexce
        run: |
          pip install rexce

      # ---------------------------------------------------------------
      # ✅ Run canonical validator
      # This enforces:
      #   - Phase‑2 invariants
      #   - Contract correctness
      #   - Policy integrity
      #   - Evidence boundary correctness (templates)
      #   - Governance correctness of circuits/rer/*
      # ---------------------------------------------------------------
      - name: Run rexce validator
        run: |
          rexce validate

      # ---------------------------------------------------------------
      # ✅ Optional: Detect drift in canonical RER circuit templates
      # Ensures:
      #   - evidence scaffold matches contract expectations
      #   - PDR boundary not modified without GCP
      #   - workflows remain valid
      # ---------------------------------------------------------------
      - name: Drift detection (canonical RER circuit)
        run: |
          set -euo pipefail

          echo "=== RER Canonical Drift Scan ==="

          REQUIRED_PATHS=(
            "circuits/rer/evidence"
            "circuits/rer/pdr/evidence-dirs.txt"
            "circuits/rer/workflows/rer-governance-gate.yml"
            "circuits/rer/CODEOWNERS"
            "circuits/rer/rer.lock.yml"
          )

          for p in "${REQUIRED_PATHS[@]}"; do
            if [[ ! -e "$p" ]]; then
              echo "❌ Missing required canonical file: $p"
              exit 1
            fi
          done

          echo "✅ Canonical template structure looks intact."

      # ---------------------------------------------------------------
      # ✅ Final Output
      # ---------------------------------------------------------------
      - name: Validation success
        if: success()
        run: echo "✅ Xentred governance validation passed."
